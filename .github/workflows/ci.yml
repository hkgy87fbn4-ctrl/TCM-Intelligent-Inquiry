name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-ollama:
    name: Backend (unit + Ollama live IT)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull CI models
        run: |
          set -e
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          echo $! > /tmp/ollama.pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:11434/api/version; then
              break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "Ollama failed to start"; cat /tmp/ollama.log; exit 1
            fi
          done
          ollama pull tinyllama
          ollama pull nomic-embed-text
          ollama list

      - name: Maven test (OLLAMA_LIVE enables integration tests)
        working-directory: backend
        env:
          OLLAMA_LIVE: "true"
        run: ./mvnw -B test -ntp

      - name: Stop Ollama
        if: always()
        run: |
          if [ -f /tmp/ollama.pid ]; then kill "$(cat /tmp/ollama.pid)" 2>/dev/null || true; fi

      - name: Upload Ollama log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ollama-log
          path: /tmp/ollama.log

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci and build
        working-directory: frontend
        run: |
          npm ci
          npm run build
